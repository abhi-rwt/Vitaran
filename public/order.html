<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Delivery - Vitaran</title>

<link rel="stylesheet" href="order.css">

<!-- ✅ LEAFLET CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<!-- ✅ LEAFLET JS (NO DEFER ISSUE) -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- ✅ FALLBACK CDN (agar upar wala fail ho jaye) -->
<script>
if(typeof L === "undefined"){
  document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"><\/script>');
}
</script>

<!-- YOUR JS -->
<script src="order.js" defer></script>

</head>

<body>

<header class="header">
  <h2>🚚 Order Delivery</h2>
</header>

<main class="container">

<section class="card order-box">
<h3 id="orderId"></h3>
<p><strong>Payment:</strong> <span id="paymentType"></span></p>
<p><strong>Amount:</strong> ₹<span id="amount"></span></p>
<p><strong>Profit:</strong> ₹<span id="profit"></span></p>
</section>

<section class="card">
<div id="map" class="map-box" style="height:400px;"></div>
</section>

<section class="card">
<div id="buttons">
<button class="pickup" onclick="arrived()">📍 Arrived</button>
<button class="picked" onclick="picked()" disabled id="pickedBtn">📦 Picked</button>
<button class="delivered" onclick="delivered()" disabled id="deliverBtn">✅ Delivered</button>
</div>
</section>

</main>

</body>
</html>
