<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Delivery - Vitaran</title>

<link rel="stylesheet" href="dashboard.css">

<!-- MAPPLS -->
<script src="https://apis.mappls.com/advancedmaps/api/YOUR_API_KEY/map_sdk?layer=vector&v=3.0"></script>

<script src="order.js" defer></script>
</head>

<body>

<header class="header">
<h2>🚚 Order Delivery</h2>
</header>

<main class="container">

<section class="card">

<h3 id="orderId">Order #</h3>

<p><strong>Payment:</strong> <span id="paymentType"></span></p>
<p><strong>Amount:</strong> ₹<span id="amount"></span></p>
<p><strong>Profit:</strong> ₹<span id="profit"></span></p>

</section>


<!-- MAP -->
<section class="card">
<div id="map" style="width:100%; height:350px;"></div>
</section>


<!-- DELIVERY BUTTONS -->
<section class="card">

<div id="buttons">

<button class="btn primary" onclick="arrived()">Arrived at Pickup</button>

<button class="btn primary" onclick="picked()" disabled id="pickedBtn">
Picked Order
</button>

<button class="btn primary" onclick="delivered()" disabled id="deliverBtn">
Delivered
</button>

</div>

</section>

</main>

</body>
</html>
